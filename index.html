<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>RunCrew</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F1F5F4}
input,textarea{width:100%;padding:9px 12px;border:1px solid #D1D5DB;border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:#111;outline:none;transition:border 0.15s}
input:focus,textarea:focus{border-color:#0F766E;box-shadow:0 0 0 3px rgba(15,118,110,0.1)}
button{font-family:inherit;cursor:pointer}
.btn{width:100%;background:#0F766E;color:white;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:500;transition:background 0.15s}
.btn:hover{background:#0D6860}
.btn:disabled{background:#E5E7EB;color:#9CA3AF;cursor:default}
.btn-sec{background:#fff;color:#374151;border:1px solid #E5E7EB}
.btn-sec:hover{background:#F9FAFB}
.tab-btn{flex:1;padding:11px 6px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-size:13px;font-weight:400;color:#6B7280;font-family:inherit;transition:all 0.15s}
.tab-btn.active{border-bottom-color:#0F766E;color:#0F766E;font-weight:500}
.card{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:1rem 1.25rem;margin-bottom:10px}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
#app{height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:#F1F5F4}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1F2937;color:white;padding:10px 18px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
const SURL="https://xuxwqmjvgxzpdwumxzrp.supabase.co";
const SKEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh1eHdxbWp2Z3h6cGR3dW14enJwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MjYzODMsImV4cCI6MjA5MDMwMjM4M30.PJQxMREH663toOuXEMMOQ21HDpsO_brt6EQCz-D5OH4";
const sb=supabase.createClient(SURL,SKEY);

const COLORS=["#0F766E","#2563EB","#9333EA","#D97706","#DC2626","#0891B2","#65A30D","#DB2777"];
function uColor(n){let h=0;for(let c of n)h=(h*31+c.charCodeAt(0))%COLORS.length;return COLORS[h];}
function genCode(){return Math.random().toString(36).substring(2,7).toUpperCase();}

const today=new Date();today.setHours(0,0,0,0);
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function iso(d){return d.toISOString().split("T")[0];}
function fmtL(d){return new Date(d+"T12:00:00").toLocaleDateString("fr-CA",{weekday:"long",day:"numeric",month:"long"});}
function fmtS(d){return d.toLocaleDateString("fr-CA",{weekday:"short",day:"numeric"});}

let savedUser=null;
try{const u=localStorage.getItem("rc_user");if(u)savedUser=JSON.parse(u);}catch(e){}

let S={
  view:savedUser?"groups":"login",
  user:savedUser,
  groups:[],
  activeGroup:null,
  runs:[],
  allMembers:[],
  tab:"week",weekOffset:0,appTab:"agenda",
  form:{date:"",time:"",location:"",desc:""},
  modal:null,showForm:false
};

function saveUser(){try{localStorage.setItem("rc_user",JSON.stringify(S.user));}catch(e){}}
function clearUser(){try{localStorage.removeItem("rc_user");}catch(e){}}

function toast(msg,dur=2500){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),dur);
}

function r(){
  const app=document.getElementById("app");
  if(S.view==="login")app.innerHTML=vLogin();
  else if(S.view==="groups")app.innerHTML=vGroups();
  else if(S.view==="join")app.innerHTML=vJoin();
  else if(S.view==="create")app.innerHTML=vCreate();
  else if(S.view==="pending")app.innerHTML=vPending();
  else if(S.view==="main")app.innerHTML=vMain();
  bind();
}

function topBar(title,back=true){
  return`<div style="background:#0F172A;padding:13px 1.25rem;flex-shrink:0;display:flex;align-items:center;gap:12px">
    ${back?`<button id="btnback" style="background:none;border:none;color:#94A3B8;font-size:20px;cursor:pointer;padding:0;line-height:1">←</button>`:""}
    <span style="color:white;font-weight:600;font-size:16px">${title}</span>
  </div>`;
}

// ── VUES ──────────────────────────────────────────────────────

function vLogin(){return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;height:100vh;background:#F1F5F4">
<div style="width:100%;max-width:360px;background:#fff;border-radius:16px;border:1px solid #E5E7EB;padding:2rem;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
  <div style="text-align:center;margin-bottom:2rem">
    <div style="width:56px;height:56px;background:#0F172A;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1.5"/><path d="M5 20l4.5-5 2.5 2 3-6 4 9"/><path d="M3 10c2-3 4-4 9-4s8 1 9 4"/></svg>
    </div>
    <h1 style="font-size:22px;font-weight:600;color:#111">RunCrew</h1>
    <p style="font-size:13px;color:#6B7280;margin-top:4px">L'agenda de course de ton groupe</p>
  </div>
  <label style="font-size:13px;color:#374151;display:block;margin-bottom:4px;font-weight:500">Ton prénom</label>
  <input id="ln" placeholder="ex. Marie" style="margin-bottom:12px"/>
  <label style="font-size:13px;color:#374151;display:block;margin-bottom:4px;font-weight:500">Numéro WhatsApp / SMS <span style="font-size:11px;color:#9CA3AF;font-weight:400">optionnel</span></label>
  <input id="lp" type="tel" placeholder="514 000 0000" style="margin-bottom:6px"/>
  <p style="font-size:11px;color:#9CA3AF;margin-bottom:20px">Permet à tes amis de te contacter pour rejoindre tes sorties.</p>
  <button id="lbtn" class="btn" disabled>Continuer</button>
</div></div>`;}

function vGroups(){
  const pending=S.groups.filter(g=>g.membership&&g.membership.status==="pending");
  const active=S.groups.filter(g=>!g.membership||g.membership.status==="approved");
  function groupCard({group,membership,isCreator}){
    const badge=isCreator
      ?`<span class="badge" style="background:#EDE9FE;color:#5B21B6">Admin</span>`
      :`<span class="badge" style="background:#D1FAE5;color:#065F46">Membre</span>`;
    return`<div data-gid="${group.id}" class="card" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-weight:500;font-size:15px;color:#111;margin-bottom:4px">${group.name}</div>
      <div style="font-size:12px;color:#9CA3AF">Code : <strong style="color:#6B7280;letter-spacing:1px">${group.code}</strong></div></div>
      ${badge}
    </div>`;
  }
  return`<div style="height:100vh;display:flex;flex-direction:column;background:#F1F5F4">
  <div style="background:#0F172A;padding:13px 1.25rem;flex-shrink:0">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="color:white;font-weight:600;font-size:17px">RunCrew</span>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="color:#94A3B8;font-size:13px">${S.user.name}</span>
        <button id="logout" style="font-size:12px;color:#64748B;background:none;border:none;cursor:pointer">Changer</button>
      </div>
    </div>
  </div>
  <div style="flex:1;overflow-y:auto;padding:1rem">
    ${pending.length?`<p style="font-size:12px;font-weight:500;color:#92400E;margin-bottom:8px;background:#FEF3C7;padding:8px 12px;border-radius:8px">⏳ ${pending.length} demande${pending.length>1?"s":""} en attente d'approbation</p>`:""}
    ${active.length===0&&pending.length===0
      ?`<div style="text-align:center;padding:2.5rem 1rem;color:#9CA3AF"><p style="font-size:14px">Tu n'es dans aucun groupe pour l'instant.</p></div>`
      :`<p style="font-size:12px;font-weight:500;color:#6B7280;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Mes groupes</p>${active.map(groupCard).join("")}`}
    ${pending.length?`<p style="font-size:12px;font-weight:500;color:#6B7280;margin:16px 0 8px;text-transform:uppercase;letter-spacing:.5px">En attente</p>
    ${pending.map(g=>`<div class="card" style="display:flex;justify-content:space-between;align-items:center;opacity:0.7">
      <div><div style="font-weight:500;font-size:15px;color:#111">${g.group.name}</div></div>
      <span class="badge" style="background:#FEF3C7;color:#92400E">En attente</span>
    </div>`).join("")}`:""}
  </div>
  <div style="padding:1rem;background:#fff;border-top:1px solid #E5E7EB;display:flex;gap:10px;flex-shrink:0">
    <button id="btnjoin" class="btn btn-sec" style="flex:1">Rejoindre</button>
    <button id="btncreate" class="btn" style="flex:1">Créer un groupe</button>
  </div>
</div>`;}

function vCreate(){return`<div style="height:100vh;display:flex;flex-direction:column;background:#F1F5F4">
  ${topBar("Créer un groupe")}
  <div style="flex:1;padding:1.5rem">
    <label style="font-size:13px;color:#374151;display:block;margin-bottom:4px;font-weight:500">Nom du groupe</label>
    <input id="gname" placeholder="ex. Runners du Plateau" style="margin-bottom:16px"/>
    <p style="font-size:13px;color:#6B7280;line-height:1.6;margin-bottom:24px">Un code unique sera généré automatiquement. Partage-le à tes amis pour qu'ils puissent faire une demande d'accès.</p>
    <button id="btncreateg" class="btn">Créer le groupe</button>
  </div>
</div>`;}

function vJoin(){return`<div style="height:100vh;display:flex;flex-direction:column;background:#F1F5F4">
  ${topBar("Rejoindre un groupe")}
  <div style="flex:1;padding:1.5rem">
    <label style="font-size:13px;color:#374151;display:block;margin-bottom:4px;font-weight:500">Code du groupe</label>
    <input id="gcode" placeholder="ex. AB12C" style="margin-bottom:8px;text-transform:uppercase;letter-spacing:3px;font-size:20px;text-align:center;font-weight:600"/>
    <p style="font-size:12px;color:#9CA3AF;margin-bottom:24px;text-align:center">Demande le code au créateur du groupe</p>
    <button id="btnjoina" class="btn" disabled>Envoyer ma demande</button>
  </div>
</div>`;}

function vPending(){return`<div style="height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#F1F5F4;padding:2rem;text-align:center">
  <div style="font-size:40px;margin-bottom:16px">⏳</div>
  <h2 style="font-size:18px;font-weight:600;color:#111;margin-bottom:8px">Demande envoyée</h2>
  <p style="font-size:14px;color:#6B7280;line-height:1.6;margin-bottom:24px">Le créateur du groupe doit accepter ta demande. Tu verras le groupe dans ta liste une fois approuvé.</p>
  <button id="btnback" class="btn btn-sec" style="max-width:200px">Retour</button>
</div>`;}

function vMain(){
  const g=S.activeGroup;
  const isCreator=g.creator_name===S.user.name;
  const pending=S.allMembers.filter(m=>m.status==="pending");
  return`<div style="height:100vh;display:flex;flex-direction:column;background:#F1F5F4">
  <div style="background:#0F172A;padding:13px 1.25rem;flex-shrink:0">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <button id="btnback" style="background:none;border:none;color:#94A3B8;font-size:13px;cursor:pointer;padding:0;margin-bottom:2px;display:flex;align-items:center;gap:4px">← Groupes</button>
        <div style="color:white;font-weight:600;font-size:16px">${g.name}</div>
      </div>
      <div style="text-align:right">
        <div style="color:#475569;font-size:11px;margin-bottom:1px">Code d'accès</div>
        <div style="color:white;font-weight:700;font-size:16px;letter-spacing:2px">${g.code}</div>
      </div>
    </div>
  </div>
  <div style="background:#fff;border-bottom:1px solid #E5E7EB;flex-shrink:0"><div style="display:flex">
    <button class="tab-btn ${S.appTab==="agenda"?"active":""}" data-apptab="agenda">Agenda</button>
    ${isCreator?`<button class="tab-btn ${S.appTab==="members"?"active":""}" data-apptab="members">Membres${pending.length>0?` <span style="background:#EF4444;color:white;border-radius:10px;padding:1px 6px;font-size:10px;margin-left:3px">${pending.length}</span>`:""}</button>`:""}
  </div></div>
  ${S.appTab==="agenda"?`<div style="background:#fff;border-bottom:1px solid #E5E7EB;flex-shrink:0"><div style="display:flex">
    <button class="tab-btn ${S.tab==="week"?"active":""}" data-tab="week">Semaine</button>
    <button class="tab-btn ${S.tab==="list"?"active":""}" data-tab="list">Liste</button>
  </div></div>`:""}
  <div style="flex:1;overflow-y:auto">
    ${S.appTab==="agenda"?(S.tab==="week"?vWeek():vList()):vMembers(isCreator,pending)}
  </div>
  ${S.appTab==="agenda"?`<div style="padding:1rem;background:#fff;border-top:1px solid #E5E7EB;flex-shrink:0">
    <button id="addbtn" class="btn">+ Planifier une sortie</button>
  </div>`:""}
  ${S.modal?vModal():""}
  ${S.showForm?vForm():""}
</div>`;}

function vWeek(){
  const ws=addDays(today,S.weekOffset*7);
  const days=Array.from({length:7},(_,i)=>addDays(ws,i));
  const label=`${fmtS(days[0])} – ${fmtS(days[6])}`;
  const cols=days.map(d=>{
    const di=iso(d);
    const dr=S.runs.filter(x=>x.date===di).sort((a,b)=>a.time.localeCompare(b.time));
    const iT=di===iso(today),iP=d<today;
    return`<div style="flex:1;min-width:0;border-right:1px solid #F3F4F6;padding:0 3px 8px">
      <div style="padding:8px 2px 6px;text-align:center;border-bottom:1px solid #F3F4F6;margin-bottom:5px">
        <div style="font-size:9px;color:${iP?"#D1D5DB":"#9CA3AF"};text-transform:uppercase;letter-spacing:.5px">${d.toLocaleDateString("fr-CA",{weekday:"short"})}</div>
        <div style="width:24px;height:24px;border-radius:50%;background:${iT?"#0F766E":"transparent"};display:flex;align-items:center;justify-content:center;margin:3px auto 0">
          <span style="font-size:12px;font-weight:${iT?600:400};color:${iT?"#fff":iP?"#D1D5DB":"#111"}">${d.getDate()}</span>
        </div>
      </div>
      ${dr.map(x=>{const c=uColor(x.creator_name);return`<div data-runid="${x.id}" style="background:${c}18;border-left:3px solid ${c};border-radius:0 6px 6px 0;padding:5px 6px;margin-bottom:4px;cursor:pointer">
        <div style="font-size:10px;font-weight:600;color:${c}">${x.time}</div>
        <div style="font-size:10px;color:#111;line-height:1.3;margin-top:1px">${x.creator_name}</div>
        ${x.location?`<div style="font-size:9px;color:#6B7280">${x.location}</div>`:""}
      </div>`;}).join("")}
    </div>`;
  }).join("");
  const runners=[...new Set(S.runs.map(x=>x.creator_name))];
  return`<div>
  <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 1rem;background:#fff;border-bottom:1px solid #E5E7EB">
    <button id="prev" style="background:none;border:1px solid #E5E7EB;border-radius:6px;padding:4px 10px;font-size:16px;cursor:pointer;color:#374151">‹</button>
    <span style="font-size:13px;font-weight:500;color:#111;text-transform:capitalize">${label}</span>
    <button id="next" style="background:none;border:1px solid #E5E7EB;border-radius:6px;padding:4px 10px;font-size:16px;cursor:pointer;color:#374151">›</button>
  </div>
  <div style="display:flex;background:#fff">${cols}</div>
  ${runners.length?`<div style="padding:.75rem 1rem;display:flex;gap:10px;flex-wrap:wrap;background:#fff;border-top:1px solid #F3F4F6">
    ${runners.map(n=>`<span style="display:flex;align-items:center;gap:5px;font-size:12px;color:#6B7280"><span style="width:8px;height:8px;border-radius:50%;background:${uColor(n)};display:inline-block"></span>${n}</span>`).join("")}
  </div>`:""}
  </div>`;}

function vList(){
  const up=S.runs.filter(x=>new Date(x.date+"T23:59:00")>=today).sort((a,b)=>new Date(a.date+"T"+a.time)-new Date(b.date+"T"+b.time));
  if(!up.length)return`<div style="text-align:center;padding:3rem 1rem;color:#9CA3AF"><p style="font-size:14px">Aucune sortie à venir.</p></div>`;
  return`<div style="padding:1rem">${up.map(x=>{const c=uColor(x.creator_name);return`<div data-runid="${x.id}" class="card" style="border-left:3px solid ${c};cursor:pointer">
    <div style="font-size:13px;color:${c};font-weight:600;text-transform:capitalize;margin-bottom:4px">${fmtL(x.date)} · ${x.time}${x.location?" · "+x.location:""}</div>
    <p style="margin:0 0 8px;font-size:14px;line-height:1.55;color:#111">${x.description}</p>
    <span style="font-size:13px;color:#6B7280">Par <strong style="font-weight:500;color:#111">${x.creator_name}</strong></span>
  </div>`;}).join("")}</div>`;}

function vMembers(isCreator,pending){
  const approved=S.allMembers.filter(m=>m.status==="approved");
  return`<div style="padding:1rem">
  ${pending.length?`<p style="font-size:12px;font-weight:600;color:#374151;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Demandes en attente (${pending.length})</p>
  ${pending.map(m=>`<div class="card" style="display:flex;justify-content:space-between;align-items:center;gap:10px">
    <div><div style="font-weight:500;font-size:14px;color:#111">${m.member_name}</div>${m.member_phone?`<div style="font-size:12px;color:#9CA3AF">${m.member_phone}</div>`:""}</div>
    <div style="display:flex;gap:6px;flex-shrink:0">
      <button data-approve="${m.id}" style="background:#D1FAE5;color:#065F46;border:none;border-radius:6px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">Accepter</button>
      <button data-refuse="${m.id}" style="background:#FEE2E2;color:#991B1B;border:none;border-radius:6px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">Refuser</button>
    </div>
  </div>`).join("")}<div style="height:1px;background:#E5E7EB;margin:16px 0"></div>`:""}
  <p style="font-size:12px;font-weight:600;color:#374151;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">Membres (${approved.length+1})</p>
  <div class="card" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div><div style="font-weight:500;font-size:14px;color:#111">${S.user.name}</div><div style="font-size:12px;color:#9CA3AF">Toi · Admin</div></div>
    <span class="badge" style="background:#EDE9FE;color:#5B21B6">Admin</span>
  </div>
  ${approved.length?approved.map(m=>`<div class="card" style="display:flex;justify-content:space-between;align-items:center">
    <div><div style="font-weight:500;font-size:14px;color:#111">${m.member_name}</div>${m.member_phone?`<div style="font-size:12px;color:#9CA3AF">${m.member_phone}</div>`:""}</div>
    <button data-kick="${m.id}" style="font-size:12px;color:#9CA3AF;background:none;border:none;cursor:pointer;padding:4px">Retirer</button>
  </div>`).join(""):`<p style="font-size:13px;color:#9CA3AF;text-align:center;padding:1rem">Aucun autre membre pour l'instant.</p>`}
  </div>`;}

function vModal(){
  const x=S.modal,c=uColor(x.creator_name),own=x.creator_name===S.user.name;
  const action=own
    ?`<button id="mdel" style="font-size:13px;color:#DC2626;background:none;border:none;cursor:pointer">Retirer cette sortie</button>`
    :x.creator_phone
      ?`<div style="display:flex;gap:8px">
          <button id="mwa" style="background:#25D366;color:white;border:none;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;font-weight:500">WhatsApp</button>
          <button id="msms" style="background:#F3F4F6;color:#111;border:1px solid #E5E7EB;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer">SMS</button>
        </div>`
      :`<span style="font-size:12px;color:#9CA3AF">Pas de contact renseigné</span>`;
  return`<div id="moverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:100">
  <div style="width:100%;max-width:480px;background:#fff;border-radius:16px 16px 0 0;padding:1.5rem">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <span style="font-size:12px;font-weight:600;color:${c};background:${c}18;padding:4px 12px;border-radius:20px">${x.time} · ${fmtL(x.date)}</span>
      <button id="mclose" style="background:none;border:none;font-size:24px;cursor:pointer;color:#6B7280;line-height:1;padding:0">×</button>
    </div>
    ${x.location?`<div style="font-size:13px;color:#6B7280;margin-bottom:10px">📍 ${x.location}</div>`:""}
    <p style="font-size:15px;line-height:1.65;color:#111;margin-bottom:16px">${x.description}</p>
    <div style="display:flex;justify-content:space-between;align-items:center;padding-top:14px;border-top:1px solid #F3F4F6">
      <span style="font-size:14px;color:#6B7280">Par <strong style="font-weight:500;color:#111">${x.creator_name}</strong></span>
      ${action}
    </div>
  </div>
</div>`;}

function vForm(){
  const f=S.form,ti=iso(today),ok=f.date&&f.time&&f.desc;
  return`<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:100">
  <div style="width:100%;max-width:480px;background:#fff;border-radius:16px 16px 0 0;padding:1.5rem">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem">
      <h2 style="font-size:18px;font-weight:600;color:#111">Planifier une sortie</h2>
      <button id="fclose" style="background:none;border:none;font-size:24px;cursor:pointer;color:#6B7280;line-height:1;padding:0">×</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <div><label style="font-size:13px;color:#374151;display:block;margin-bottom:4px;font-weight:500">Date</label><input id="fdate" type="date" min="${ti}" value="${f.date}"/></div>
      <div><label style="font-size:13px;color:#374151;display:block;margin-bottom:4px;font-weight:500">Heure</label><input id="ftime" type="time" value="${f.time}"/></div>
    </div>
    <div style="margin-bottom:12px"><label style="font-size:13px;color:#374151;display:block;margin-bottom:4px;font-weight:500">Lieu <span style="font-size:11px;color:#9CA3AF;font-weight:400">optionnel</span></label><input id="floc" type="text" placeholder="Mont-Royal, Canal Lachine..." value="${f.location}"/></div>
    <div style="margin-bottom:20px"><label style="font-size:13px;color:#374151;display:block;margin-bottom:4px;font-weight:500">Description</label><textarea id="fdesc" rows="3" placeholder="Distance, rythme, niveau..." style="resize:vertical">${f.desc}</textarea></div>
    <button id="fadd" class="btn" ${ok?"":"disabled"}>Ajouter à l'agenda</button>
  </div>
</div>`;}

// ── BIND ──────────────────────────────────────────────────────
function bind(){
  // LOGIN
  const ln=document.getElementById("ln");
  if(ln){
    const lb=document.getElementById("lbtn");
    ln.addEventListener("input",()=>lb.disabled=!ln.value.trim());
    lb.addEventListener("click",async()=>{
      if(!ln.value.trim())return;
      lb.disabled=true;lb.innerHTML=`<span class="spinner"></span>Chargement...`;
      S.user={name:ln.value.trim(),phone:document.getElementById("lp").value.trim()||null};
      saveUser();await loadGroups();S.view="groups";r();
    });
    ln.addEventListener("keydown",e=>{if(e.key==="Enter"&&ln.value.trim())lb.click();});
  }

  // LOGOUT
  document.getElementById("logout")?.addEventListener("click",()=>{clearUser();S.user=null;S.groups=[];S.view="login";r();});

  // BACK
  document.getElementById("btnback")?.addEventListener("click",async()=>{
    if(["join","create","pending"].includes(S.view)){S.view="groups";r();}
    else if(S.view==="main"){await loadGroups();S.view="groups";r();}
  });

  // GROUPS
  document.getElementById("btnjoin")?.addEventListener("click",()=>{S.view="join";r();});
  document.getElementById("btncreate")?.addEventListener("click",()=>{S.view="create";r();});
  document.querySelectorAll("[data-gid]").forEach(el=>el.addEventListener("click",async()=>{
    const found=S.groups.find(g=>g.group.id===el.dataset.gid);
    if(!found)return;
    S.activeGroup=found.group;S.tab="week";S.weekOffset=0;S.appTab="agenda";
    await loadGroupData();S.view="main";r();
  }));

  // CREATE
  document.getElementById("btncreateg")?.addEventListener("click",async()=>{
    const nm=document.getElementById("gname")?.value.trim();
    if(!nm)return;
    const btn=document.getElementById("btncreateg");
    btn.disabled=true;btn.innerHTML=`<span class="spinner"></span>Création...`;
    const code=genCode();
    const{error}=await sb.from("groups").insert([{name:nm,code,creator_name:S.user.name}]);
    if(error){toast("Erreur.");btn.disabled=false;btn.textContent="Créer le groupe";return;}
    await loadGroups();toast("Groupe créé · Code : "+code,5000);S.view="groups";r();
  });

  // JOIN
  const gc=document.getElementById("gcode");
  if(gc){
    const ja=document.getElementById("btnjoina");
    gc.addEventListener("input",()=>{gc.value=gc.value.toUpperCase();ja.disabled=gc.value.trim().length<3;});
    ja.addEventListener("click",async()=>{
      const code=gc.value.trim();
      ja.disabled=true;ja.innerHTML=`<span class="spinner"></span>Envoi...`;
      const{data:gs}=await sb.from("groups").select("*").eq("code",code);
      if(!gs||!gs.length){toast("Code introuvable.");ja.disabled=false;ja.textContent="Envoyer ma demande";return;}
      const grp=gs[0];
      if(grp.creator_name===S.user.name){toast("Tu es le créateur de ce groupe.");ja.disabled=false;ja.textContent="Envoyer ma demande";return;}
      const{data:ex}=await sb.from("memberships").select("id").eq("group_id",grp.id).eq("member_name",S.user.name);
      if(ex&&ex.length){toast("Demande déjà envoyée pour ce groupe.");ja.disabled=false;ja.textContent="Envoyer ma demande";return;}
      await sb.from("memberships").insert([{group_id:grp.id,member_name:S.user.name,member_phone:S.user.phone||null,status:"pending"}]);
      await loadGroups();S.view="pending";r();
    });
  }

  // MAIN TABS
  document.querySelectorAll("[data-apptab]").forEach(b=>b.addEventListener("click",()=>{S.appTab=b.dataset.apptab;r();}));
  document.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",()=>{S.tab=b.dataset.tab;r();}));
  document.getElementById("prev")?.addEventListener("click",()=>{S.weekOffset--;r();});
  document.getElementById("next")?.addEventListener("click",()=>{S.weekOffset++;r();});

  // RUN CARDS
  document.querySelectorAll("[data-runid]").forEach(b=>b.addEventListener("click",()=>{S.modal=S.runs.find(x=>x.id==b.dataset.runid);r();}));

  // MODAL
  document.getElementById("moverlay")?.addEventListener("click",e=>{if(e.target.id==="moverlay"){S.modal=null;r();}});
  document.getElementById("mclose")?.addEventListener("click",()=>{S.modal=null;r();});
  document.getElementById("mdel")?.addEventListener("click",async()=>{
    const id=S.modal.id;S.modal=null;
    await sb.from("runs").delete().eq("id",id);
    S.runs=S.runs.filter(x=>x.id!==id);toast("Sortie retirée.");r();
  });
  document.getElementById("mwa")?.addEventListener("click",()=>{
    const x=S.modal,n=x.creator_phone.replace(/\D/g,"");
    const msg=encodeURIComponent(`Salut ${x.creator_name} ! Je voudrais me joindre à ta sortie du ${fmtL(x.date)} à ${x.time}. C'est encore possible ?`);
    window.open(`https://wa.me/${n.startsWith("1")?n:"1"+n}?text=${msg}`,"_blank");
  });
  document.getElementById("msms")?.addEventListener("click",()=>{
    const x=S.modal;
    const msg=encodeURIComponent(`Salut ${x.creator_name} ! Je voudrais me joindre à ta sortie du ${fmtL(x.date)} à ${x.time}. C'est encore possible ?`);
    window.open(`sms:+1${x.creator_phone.replace(/\D/g,"")}?body=${msg}`);
  });

  // ADD RUN
  document.getElementById("addbtn")?.addEventListener("click",()=>{S.showForm=true;r();});
  document.getElementById("fclose")?.addEventListener("click",()=>{S.showForm=false;r();});
  const fdesc=document.getElementById("fdesc");
  if(fdesc){
    const upd=()=>{
      S.form={date:document.getElementById("fdate").value,time:document.getElementById("ftime").value,location:document.getElementById("floc").value,desc:document.getElementById("fdesc").value};
      document.getElementById("fadd").disabled=!(S.form.date&&S.form.time&&S.form.desc);
    };
    ["fdate","ftime","floc","fdesc"].forEach(id=>document.getElementById(id).addEventListener("input",upd));
    document.getElementById("fadd").addEventListener("click",async()=>{
      const f=S.form;if(!f.date||!f.time||!f.desc)return;
      const btn=document.getElementById("fadd");btn.disabled=true;btn.innerHTML=`<span class="spinner"></span>Ajout...`;
      const{data,error}=await sb.from("runs").insert([{group_id:S.activeGroup.id,creator_name:S.user.name,creator_phone:S.user.phone||null,date:f.date,time:f.time,location:f.location||null,description:f.desc}]).select().single();
      if(error){toast("Erreur.");btn.disabled=false;btn.textContent="Ajouter à l'agenda";return;}
      S.runs.push(data);S.form={date:"",time:"",location:"",desc:""};S.showForm=false;S.tab="week";toast("Sortie ajoutée !");r();
    });
  }

  // MEMBERS MANAGEMENT
  document.querySelectorAll("[data-approve]").forEach(b=>b.addEventListener("click",async()=>{
    await sb.from("memberships").update({status:"approved"}).eq("id",b.dataset.approve);
    await loadGroupData();toast("Membre accepté !");r();
  }));
  document.querySelectorAll("[data-refuse]").forEach(b=>b.addEventListener("click",async()=>{
    await sb.from("memberships").delete().eq("id",b.dataset.refuse);
    await loadGroupData();toast("Demande refusée.");r();
  }));
  document.querySelectorAll("[data-kick]").forEach(b=>b.addEventListener("click",async()=>{
    await sb.from("memberships").delete().eq("id",b.dataset.kick);
    await loadGroupData();toast("Membre retiré.");r();
  }));
}

// ── DATA ──────────────────────────────────────────────────────
async function loadGroups(){
  const[{data:created},{data:memberships}]=await Promise.all([
    sb.from("groups").select("*").eq("creator_name",S.user.name),
    sb.from("memberships").select("*,group:groups(*)").eq("member_name",S.user.name)
  ]);
  const result=[];
  (created||[]).forEach(g=>result.push({group:g,membership:null,isCreator:true}));
  (memberships||[]).forEach(m=>{if(m.group)result.push({group:m.group,membership:m,isCreator:false});});
  S.groups=result;
}

async function loadGroupData(){
  const gid=S.activeGroup.id;
  const[{data:runs},{data:members}]=await Promise.all([
    sb.from("runs").select("*").eq("group_id",gid).order("date").order("time"),
    sb.from("memberships").select("*").eq("group_id",gid)
  ]);
  S.runs=runs||[];
  S.allMembers=members||[];
}

// ── INIT ──────────────────────────────────────────────────────
(async()=>{if(S.user)await loadGroups();r();})();
</script>
</body>
</html>
