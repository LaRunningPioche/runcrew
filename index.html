<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>RunCrew</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F1F5F4}
input,textarea{width:100%;padding:9px 12px;border:1px solid #D1D5DB;border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:#111;outline:none;transition:border 0.15s}
input:focus,textarea:focus{border-color:#0F766E;box-shadow:0 0 0 3px rgba(15,118,110,0.1)}
button{font-family:inherit;cursor:pointer}
.btn{width:100%;background:#0F766E;color:white;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:500;transition:background 0.15s}
.btn:hover{background:#0D6860}
.btn:disabled{background:#E5E7EB;color:#9CA3AF;cursor:default}
.btn-sec{background:#fff;color:#374151;border:1px solid #E5E7EB}
.btn-sec:hover{background:#F9FAFB}
.tab-btn{flex:1;padding:11px 6px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-size:13px;font-weight:400;color:#6B7280;font-family:inherit;transition:all 0.15s}
.tab-btn.active{border-bottom-color:#0F766E;color:#0F766E;font-weight:500}
.card{background:#fff;border:1px solid #E5E7EB;border-radius:12px;padding:1rem 1.25rem;margin-bottom:10px}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
#app{height:100vh;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:#F1F5F4}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1F2937;color:white;padding:10px 18px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,0.4);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script type="module" src="js/app.js"></script>
</body>
</html>
